# Qdrant vector database for the vision RAG index.
#
# Only Qdrant is containerized. The Python app runs on the host (`uv run ...`)
# so ColQwen2 keeps its Apple MPS / CUDA GPU access.
#
#   docker compose up -d          # start Qdrant (dashboard: http://localhost:6333/dashboard)
#   docker compose down           # stop it (data persists in the qdrant_storage volume)
#
# Point the app at it by setting QDRANT_URL=http://localhost:6333 in .env.
services:
  qdrant:
    image: qdrant/qdrant:v1.18.3   # pinned; wire-compatible with qdrant-client 1.18.x
    ports:
      - "6333:6333"                # REST + dashboard
      - "6334:6334"                # gRPC
    environment:
      # ColQwen2 multivectors are large (~1.4 MB/page), so a multi-page upsert
      # batch can exceed Qdrant's default 32 MB REST payload cap. Raise it well
      # above any realistic batch. (UPSERT_BATCH_SIZE keeps batches modest too.)
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=256
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
