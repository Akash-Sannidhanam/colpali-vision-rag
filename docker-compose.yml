# Qdrant + the Vision RAG API for the vision RAG index.
#
#   docker compose up -d qdrant   # Qdrant only; run the app on the host (keeps MPS/CUDA)
#   GEMINI_API_KEY=... docker compose up   # full stack: Qdrant + the containerized API
#   docker compose down           # stop; data persists in the qdrant_storage volume
#
# Running just Qdrant and the app on the host is the dev default (ColQwen2 keeps its
# Apple MPS / NVIDIA GPU). The `app` service is for a container deployment; on a GPU
# host, uncomment its `deploy.resources` block and install the NVIDIA container toolkit.
services:
  qdrant:
    image: qdrant/qdrant:v1.18.3   # pinned; wire-compatible with qdrant-client 1.18.x
    ports:
      - "6333:6333"                # REST + dashboard
      - "6334:6334"                # gRPC
    environment:
      # ColQwen2 multivectors are large (~1.4 MB/page), so a multi-page upsert
      # batch can exceed Qdrant's default 32 MB REST payload cap. Raise it well
      # above any realistic batch. (UPSERT_BATCH_SIZE keeps batches modest too.)
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=256
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  app:
    build: .
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    environment:
      # Reach Qdrant over the compose network (service name), not localhost.
      - QDRANT_URL=http://qdrant:6333
      # Passed through from your shell / .env - never hard-code the key here.
      - GEMINI_API_KEY=${GEMINI_API_KEY:?set GEMINI_API_KEY in your env or .env}
      # Let a browser UI on the host call the containerized API.
      - CORS_ALLOW_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - hf_cache:/home/appuser/.cache/huggingface   # persist the ~2B model download
    restart: unless-stopped
    # GPU passthrough: uncomment on a host with the NVIDIA container toolkit installed.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  qdrant_storage:
  hf_cache:
