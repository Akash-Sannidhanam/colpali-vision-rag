name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege GITHUB_TOKEN: the jobs only read the repo (checkout + install + checks).
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. a force-push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback: ruff only, so it needs no ML stack (uv installs just ruff/mypy).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --only-group lint
      - run: uv run ruff check .

  # mypy + pytest run against the real dependency set (uv provisions Python 3.13 and
  # installs the CUDA torch wheels per pyproject - a multi-GB install, cached by setup-uv).
  # mypy lives here, not in `lint`, so it sees pydantic/PIL/fastapi types instead of Any.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --group lint
      - run: uv run mypy src eval
      - run: uv run pytest
